<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feminino | DWD Street</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="nav-icons">
        <a href="login.html" class="icon-btn">👤</a>
        <a href="carrinho.html" class="icon-btn" style="position: relative; display: inline-block;">
            🛒
            <span id="cart-count" class="cart-badge" style="display: none;">0</span>
        </a>
    </div>

    <main class="container" style="padding: 40px 5%; max-width: 1200px; margin: 0 auto;">
        <div style="font-size: 0.8rem; color: #888; margin-bottom: 20px;">HOME > FEMININO</div>
        <h2 style="font-weight: 900; font-size: 2rem; margin-bottom: 30px;">COLEÇÃO FEMININA</h2>
        
        <div class="product-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px;">
            <div class="product-card" style="border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 8px;">
                <img src="assets/img/camiseta_banner.png" alt="Cropped" style="width: 100%; border-radius: 4px;">
                <h3 style="margin: 15px 0 5px; font-size: 1.1rem;">Cropped DWD Logo</h3>
                <p style="font-weight: 900; font-size: 1.2rem; color: #e31e24; margin-bottom: 15px;">R$ 89,90</p>
                <button class="auth-btn" style="width: 100%;">Adicionar ao Carrinho</button>
            </div>
            
            <div class="product-card" style="border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 8px;">
                <img src="assets/img/camiseta_banner.png" alt="Calça Jogger" style="width: 100%; border-radius: 4px;">
                <h3 style="margin: 15px 0 5px; font-size: 1.1rem;">Calça Jogger Moletom</h3>
                <p style="font-weight: 900; font-size: 1.2rem; color: #e31e24; margin-bottom: 15px;">R$ 189,90</p>
                <button class="auth-btn" style="width: 100%;">Adicionar ao Carrinho</button>
            </div>
            
            <div class="product-card" style="border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 8px;">
                <img src="assets/img/camiseta_banner.png" alt="Corta-vento" style="width: 100%; border-radius: 4px;">
                <h3 style="margin: 15px 0 5px; font-size: 1.1rem;">Jaqueta Corta-Vento</h3>
                <p style="font-weight: 900; font-size: 1.2rem; color: #e31e24; margin-bottom: 15px;">R$ 229,90</p>
                <button class="auth-btn" style="width: 100%;">Adicionar ao Carrinho</button>
            </div>
        </div>
    </main>

    <button id="theme-toggle" class="theme-toggle">🌙</button>
    
    <script>
        // MODO ESCURO - VERIFICAÇÃO IMEDIATA (Faz o tema persistir entre as páginas)
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        if (themeToggleBtn) {
            // Ajusta o emoji do botão se já iniciou em dark-mode
            if (body.classList.contains('dark-mode')) {
                themeToggleBtn.textContent = '☀️'; 
            }

            themeToggleBtn.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                
                if (body.classList.contains('dark-mode')) {
                    localStorage.setItem('theme', 'dark');
                    themeToggleBtn.textContent = '☀️';
                } else {
                    localStorage.setItem('theme', 'light');
                    themeToggleBtn.textContent = '🌙';
                }
            });
        }
    </script>
</body>
</html>
