<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Carrinho | DWD Street</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-light">
    <main class="container">
        <h2 class="title-page">MEU CARRINHO</h2>
        <div class="cart-grid">
            <div class="cart-items-list">
                <div class="cart-item">
                    <img src="assets/img/camiseta_banner.png" alt="Produto">
                    <div class="item-details">
                        <h4>Camiseta DWD Oversized</h4>
                        <p>Tamanho: G</p>
                        <span class="item-price">R$ 129,90</span>
                    </div>
                    <button class="remove-btn">🗑️</button>
                </div>
            </div>
            
            <div class="cart-summary-box">
                <h3>RESUMO</h3>
                <div class="summary-line"><span>Subtotal</span> <span>R$ 129,90</span></div>
                <div class="summary-line"><span>Frete</span> <span class="free">GRÁTIS</span></div>
                <div class="summary-total"><span>TOTAL</span> <span>R$ 129,90</span></div>
                <button class="btn-checkout">FINALIZAR COMPRA</button>
            </div>
        </div>
    </main>
    <button id="theme-toggle" class="theme-toggle">🌙</button>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        if (themeToggleBtn) {
            if (localStorage.getItem('theme') === 'dark') {
                body.classList.add('dark-mode');
                themeToggleBtn.textContent = '☀️'; 
            }

            themeToggleBtn.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                
                if (body.classList.contains('dark-mode')) {
                    localStorage.setItem('theme', 'dark');
                    themeToggleBtn.textContent = '☀️';
                } else {
                    localStorage.setItem('theme', 'light');
                    themeToggleBtn.textContent = '🌙';
                }
            });
        }
    </script>
</body>
</html>
