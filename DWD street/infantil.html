<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infantil | DWD Street</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="nav-icons">
        <a href="login.html" class="icon-btn">👤</a>
        <a href="carrinho.html" class="icon-btn" style="position: relative; display: inline-block;">
            🛒
            <span id="cart-count" class="cart-badge" style="display: none;">0</span>
        </a>
    </div>

    <main class="products-container">
        <div class="breadcrumb">HOME > INFANTIL</div>
        <h2 class="category-title">COLEÇÃO INFANTIL</h2>
        
        <div class="product-grid">
            <div class="product-card">
                <img src="assets/img/camiseta_banner.png" alt="Camiseta Infantil">
                <h3 class="product-title">Camiseta Mini DWD</h3>
                <p class="product-price">R$ 79,90</p>
                <button class="auth-btn" style="width: 100%;">Adicionar ao Carrinho</button>
            </div>
            
            <div class="product-card">
                <img src="assets/img/camiseta_banner.png" alt="Moletom Infantil">
                <h3 class="product-title">Moletom Kids Street</h3>
                <p class="product-price">R$ 149,90</p>
                <button class="auth-btn" style="width: 100%;">Adicionar ao Carrinho</button>
            </div>
            
            <div class="product-card">
                <img src="assets/img/camiseta_banner.png" alt="Boné Infantil">
                <h3 class="product-title">Boné Kids Aba Reta</h3>
                <p class="product-price">R$ 59,90</p>
                <button class="auth-btn" style="width: 100%;">Adicionar ao Carrinho</button>
            </div>
            
            <div class="product-card">
                <img src="assets/img/camiseta_banner.png" alt="Calça Jogger Infantil">
                <h3 class="product-title">Calça Jogger Mini</h3>
                <p class="product-price">R$ 119,90</p>
                <button class="auth-btn" style="width: 100%;">Adicionar ao Carrinho</button>
            </div>
        </div>
    </main>

    <button id="theme-toggle" class="theme-toggle">🌙</button>
    
    <script>
        // MODO ESCURO - VERIFICAÇÃO IMEDIATA (Faz o tema persistir entre as páginas)
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        if (themeToggleBtn) {
            // Ajusta o emoji do botão se já iniciou em dark-mode
            if (body.classList.contains('dark-mode')) {
                themeToggleBtn.textContent = '☀️'; 
            }

            themeToggleBtn.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                
                if (body.classList.contains('dark-mode')) {
                    localStorage.setItem('theme', 'dark');
                    themeToggleBtn.textContent = '☀️';
                } else {
                    localStorage.setItem('theme', 'light');
                    themeToggleBtn.textContent = '🌙';
                }
            });
        }
    </script>
</body>
</html>
