<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masculino | DWD Street</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo">DWD<span>STREET</span></a>
        <div class="nav-icons">
            <a href="login.html" class="icon-btn">👤</a>
            <a href="carrinho.html" class="icon-btn">🛒</a>
        </div>
    </header>

    <main class="container" style="padding: 40px 5%; max-width: 1200px; margin: 0 auto;">
        <div style="font-size: 0.8rem; color: #888; margin-bottom: 20px;">HOME > MASCULINO</div>
        <h2 style="font-weight: 900; font-size: 2rem; margin-bottom: 30px;">COLEÇÃO MASCULINA</h2>
        
        <div class="product-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px;">
            <div class="product-card" style="border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 8px;">
                <img src="assets/img/camiseta_banner.png" alt="Camiseta" style="width: 100%; border-radius: 4px;">
                <h3 style="margin: 15px 0 5px; font-size: 1.1rem;">Camiseta Oversized Preta</h3>
                <p style="font-weight: 900; font-size: 1.2rem; color: #e31e24; margin-bottom: 15px;">R$ 129,90</p>
                <button class="auth-btn" style="width: 100%;">Adicionar ao Carrinho</button>
            </div>
            
            <div class="product-card" style="border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 8px;">
                <img src="assets/img/camiseta_banner.png" alt="Calça" style="width: 100%; border-radius: 4px;">
                <h3 style="margin: 15px 0 5px; font-size: 1.1rem;">Calça Cargo DWD</h3>
                <p style="font-weight: 900; font-size: 1.2rem; color: #e31e24; margin-bottom: 15px;">R$ 249,90</p>
                <button class="auth-btn" style="width: 100%;">Adicionar ao Carrinho</button>
            </div>
            
            <div class="product-card" style="border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 8px;">
                <img src="assets/img/camiseta_banner.png" alt="Moletom" style="width: 100%; border-radius: 4px;">
                <h3 style="margin: 15px 0 5px; font-size: 1.1rem;">Moletom Street Essential</h3>
                <p style="font-weight: 900; font-size: 1.2rem; color: #e31e24; margin-bottom: 15px;">R$ 299,90</p>
                <button class="auth-btn" style="width: 100%;">Adicionar ao Carrinho</button>
            </div>
        </div>
    </main>

    <button id="theme-toggle" class="theme-toggle">🌙</button>
    <script src="assets/js/script.js"></script>
</body>
</html>
