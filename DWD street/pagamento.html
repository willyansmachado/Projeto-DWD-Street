<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento | DWD Street</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo">DWD<span>STREET</span></a>
        <div class="nav-icons">
            <a href="login.html" class="icon-btn">👤</a>
            <a href="carrinho.html" class="icon-btn">🛒</a>
        </div>
    </header>

    <main class="container">
        <h2 class="title-page">FINALIZAR PAGAMENTO</h2>
        
        <div class="checkout-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 20px 0;">
            
            <div class="checkout-form-box">
                <form class="auth-form" onsubmit="event.preventDefault(); alert('Pagamento simulado com sucesso!');">
                    
                    <h3>1. Dados de Entrega</h3>
                    <div class="auth-row" style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <input type="text" placeholder="CEP" class="auth-input" style="flex: 1;" required>
                        <input type="text" placeholder="Número" class="auth-input" style="width: 80px;" required>
                    </div>
                    <input type="text" placeholder="Endereço de Entrega" class="auth-input" required>
                    <input type="text" placeholder="Bairro" class="auth-input" required>
                    
                    <br>
                    <h3>2. Forma de Pagamento</h3>
                    
                    <div class="payment-methods" style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <label style="flex: 1; border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer;">
                            <input type="radio" name="payment" value="card" checked style="margin-bottom: 8px;">
                            <div>💳 Cartão</div>
                        </label>
                        <label style="flex: 1; border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer;">
                            <input type="radio" name="payment" value="pix" style="margin-bottom: 8px;">
                            <div>📱 Pix</div>
                        </label>
                        <label style="flex: 1; border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer;">
                            <input type="radio" name="payment" value="boleto" style="margin-bottom: 8px;">
                            <div>📄 Boleto</div>
                        </label>
                    </div>

                    <div id="card-fields">
                        <input type="text" placeholder="Número do Cartão" class="auth-input">
                        <input type="text" placeholder="Nome impresso no cartão" class="auth-input">
                        <div class="auth-row" style="display: flex; gap: 10px;">
                            <input type="text" placeholder="Validade (MM/AA)" class="auth-input" style="flex: 1;">
                            <input type="text" placeholder="CVV" class="auth-input" style="flex: 1;">
                        </div>
                    </div>
                    
                    <button type="submit" class="auth-btn" style="width: 100%; margin-top: 20px; background-color: #28a745;">CONCLUIR PEDIDO</button>
                </form>
            </div>
            
            <div class="cart-summary-box" style="border: 1px solid #eee; padding: 25px; border-radius: 8px; height: fit-content;">
                <h3>REVISAR PEDIDO</h3>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
                
                <div class="checkout-item" style="display: flex; gap: 15px; align-items: center; margin-bottom: 15px;">
                    <img src="assets/img/camiseta_banner.png" alt="Produto" style="width: 60px; height: 60px; object-fit: cover; border-radius: 4px;">
                    <div style="flex: 1;">
                        <h4 style="margin: 0; font-size: 0.9rem;">Camiseta DWD Oversized</h4>
                        <p style="margin: 3px 0 0; font-size: 0.8rem; color: #888;">Qtd: 1 | Tam: G</p>
                    </div>
                    <span style="font-weight: bold; font-size: 0.9rem;">R$ 129,90</span>
                </div>
                
                <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
                
                <div class="summary-line" style="display: flex; justify-content: space-between; margin-bottom: 10px;"><span>Subtotal</span> <span>R$ 129,90</span></div>
                <div class="summary-line" style="display: flex; justify-content: space-between; margin-bottom: 10px;"><span>Frete</span> <span style="color: #28a745; font-weight: bold;">GRÁTIS</span></div>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
                <div class="summary-total" style="display: flex; justify-content: space-between; font-weight: 900; font-size: 1.2rem;"><span>TOTAL</span> <span>R$ 129,90</span></div>
            </div>

        </div>
    </main>

    <button id="theme-toggle" class="theme-toggle">🌙</button>

    <script>
        // MODO ESCURO - VERIFICAÇÃO IMEDIATA
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        if (themeToggleBtn) {
            if (body.classList.contains('dark-mode')) {
                themeToggleBtn.textContent = '☀️'; 
            }

            themeToggleBtn.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                if (body.classList.contains('dark-mode')) {
                    localStorage.setItem('theme', 'dark');
                    themeToggleBtn.textContent = '☀️';
                } else {
                    localStorage.setItem('theme', 'light');
                    themeToggleBtn.textContent = '🌙';
                }
            });
        }

        // Lógica simples para esconder/mostrar campos baseado na forma de pagamento escolhida
        const paymentRadios = document.querySelectorAll('input[name="payment"]');
        const cardFields = document.getElementById('card-fields');

        paymentRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value === 'card') {
                    cardFields.style.display = 'block';
                } else {
                    cardFields.style.display = 'none'; // Esconde os campos do cartão se for Pix ou Boleto
                }
            });
        });
    </script>
</body>
</html>
