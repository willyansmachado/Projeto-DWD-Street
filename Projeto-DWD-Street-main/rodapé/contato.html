<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | DWD Street</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <section class="pagina-banner">
    <h1>FALE COM A GENTE</h1>
    <p>Estamos prontos para ajudar você.</p>
</section>

<section class="pagina-interna">

    <h1>Fale com a Gente</h1>

    <div class="contato-grid">

        <div class="contato-info">

            <h2>Central de Atendimento</h2>

            <p>📞 (47) 99999-9999</p>

            <p>📧 contato@dwdstreet.com.br</p>

            <p>📍 Joinville - SC</p>

            <p>
                Atendimento de segunda a sexta-feira das 08h às 18h.
            </p>

        </div>

        <form class="contato-form">

            <input type="text" placeholder="Nome Completo" required>

            <input type="email" placeholder="Seu E-mail" required>

            <input type="text" placeholder="Assunto" required>

            <textarea rows="6" placeholder="Digite sua mensagem" required></textarea>

            <button type="submit">
                Enviar Mensagem
            </button>

        </form>

    </div>

</section>

</body>
</html>
